services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite:////data/plant_tracking.db
      UPLOAD_DIR: /data/uploads
      DATA_DIR: /data
      STATIC_DIR: /app/static
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
